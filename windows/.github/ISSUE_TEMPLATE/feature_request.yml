name: 🚀 功能請求
description: 想要請求添加某個功能
labels: [enhancement]
title: "[功能請求] 修改我！未修改標題的issue將被自動關閉"
body:
  - type: markdown
    attributes:
      value: |
        為了使我更好地幫助你，請提供以下資訊。以及修改上方的標題
  - type: textarea
    id: reason
    attributes:
      label: 原因
      description: 為什麼想要這個功能
    validations:
      required: true
  - type: textarea
    id: desc
    attributes:
      label: 功能簡述
      description: 想要個怎樣的功能
    validations:
      required: true
  - type: textarea
    id: logic
    attributes:
      label: 功能邏輯
      description: 如何互動、如何使用等
    validations:
      required: true
  - type: textarea
    id: ref
    attributes:
      label: 實現參考
      description: 該功能可能的實現方式，或者其他已經實現該功能的應用等