name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Gentleman-Manager-Android/**'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Gentleman-Manager-Android
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: Gentleman-Manager-Android/pnpm-lock.yaml

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and platforms
        run: |
          sdkmanager "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: pnpm install

      - name: Init Android project
        run: pnpm tauri android init
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.1.10909125

      - name: Build APK
        run: pnpm tauri android build --apk
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.1.10909125

      - name: Copy APK to project root
        run: |
          VERSION=$(node -p "require('./package.json').version")
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk' | grep -E 'universal.*release' | head -1)
          if [ -z "$APK" ]; then
            APK=$(find src-tauri/gen/android -name '*.apk' | head -1)
          fi
          test -n "$APK"
          cp "$APK" "Gentleman-Manager-Android-v${VERSION}.apk"
          ls -la "Gentleman-Manager-Android-v${VERSION}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gentleman-Manager-android-apk
          path: Gentleman-Manager-Android/Gentleman-Manager-Android-v*.apk
          if-no-files-found: error
